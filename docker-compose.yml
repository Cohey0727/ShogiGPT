services:
  server:
    # YaneuraOuはSSE42向けにビルドされているためlinux/amd64を強制
    platform: linux/amd64
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shogi-server
    ports:
      - "${SERVER_PORT:-8787}:8787"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8787
      - DATABASE_URL=file:/app/data/shogi.db
      # YaneuraOuエンジンプール設定
      - ENGINE_POOL_SIZE=${ENGINE_POOL_SIZE:-4}
      - ENGINE_USI_HASH_MB=${ENGINE_USI_HASH_MB:-16}
      - ENGINE_THREADS=${ENGINE_THREADS:-1}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      - shogi_data:/app/data
    networks:
      - shogi-network

volumes:
  shogi_data:
    driver: local

networks:
  shogi-network:
    driver: bridge
